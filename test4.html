<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Cálculo de salario</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* =====================
       RESET
    ===================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background: #fff;
      color: #000;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* =====================
       LAYOUT GENERAL
    ===================== */
    .app-layout {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .content-wrapper {
      flex: 1;
      display: flex;
    }

    /* =====================
       SIDEBAR (DESKTOP)
    ===================== */
    .sidebar {
      width: 80px;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 1rem;
      gap: 10px;
    }

    .menu-item {
      width: 100%;
      padding: 10px 0;
      text-align: center;
      font-size: 12px;
      border-radius: 8px;
      transition: background 0.3s;
      cursor: pointer;
    }

    .menu-item span {
      font-size: 22px;
      display: block;
      margin-bottom: 4px;
    }

    .menu-item:hover {
      background: #ddd;
    }

    .menu-item.active {
      background: #0D9488;
      color: #fff;
    }

    /* =====================
       CONTENIDO
    ===================== */
    .main-content {
      flex: 1;
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
    }

    h1 {
      text-align: center;
    }

    /* =====================
       TEXTO ANIMADO
    ===================== */
    .subtitle-wrapper {
      width: 100%;
      overflow: hidden;
      margin: 2rem 0;
    }

    .moving-text {
      white-space: nowrap;
      animation: slideText 18s linear infinite;
    }

    @keyframes slideText {
      0% { transform: translateX(100%); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(-100%); opacity: 0; }
    }

    /* =====================
       FORMULARIO
    ===================== */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .form-grid input {
      padding: 0.6rem;
    }

    .buttons {
      display: flex;
      gap: 1rem;
    }

    button {
      flex: 1;
      padding: 0.6rem;
      cursor: pointer;
    }

    .secondary {
      background: #f0f0f0;
    }

    /* =====================
       FOOTER (DESKTOP)
    ===================== */
    footer {
      width: 100%;
      background: #000;
      color: #fff;
      padding: 0.8rem 1rem;
      font-size: 11px;
    }

    .footer-bottom {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      text-align: center;
    }

    .footer-bottom a {
      color: #0D9488;
    }

    .rivas--tech {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-weight: bold;
    }

    .footer-logo-img {
      width: 14px;
    }

    /* =====================
       MENÚ INFERIOR
    ===================== */
    .bottom-nav {
      display: none;
    }

    /* =====================
       📱 MÓVIL
    ===================== */
    @media (max-width: 767px) {

      body {
        padding-bottom: 120px; /* menú (70) + footer (50) */
      }

      .sidebar {
        display: none;
      }

      .main-content {
        padding: 1.5rem 1rem;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .buttons {
        flex-direction: column;
      }

      /* MENÚ INFERIOR */
      .bottom-nav {
        display: flex;
        position: fixed;
        bottom: 50px;
        left: 0;
        width: 100%;
        height: 70px;
        background: #6d6a6a;
        justify-content: space-around;
        align-items: center;
        z-index: 9999;
      }

      .bottom-nav .menu-item {
        color: #fff;
        font-size: 11px;
        padding: 6px 10px;
        border-radius: 8px;
      }

      .bottom-nav .menu-item.active {
        background: #0D9488;
      }

      /* FOOTER FIJO */
      footer {
        position: fixed;
        bottom: 0;
        left: 0;
        height: 50px;
        z-index: 9998;
        padding: 0.4rem;
      }

      .footer-bottom {
        font-size: 10px;
        line-height: 1.2;
      }
    }
  </style>
</head>

<body>

  <div class="app-layout">

    <div class="content-wrapper">

      <!-- SIDEBAR -->
      <aside class="sidebar">
        <a class="menu-item active"><span>🏠</span>Home</a>
        <a class="menu-item"><span>👤</span>Perfil</a>
        <a class="menu-item"><span>📄</span>Histórico</a>
        <a class="menu-item"><span>💬</span>Novedades</a>
        <a class="menu-item"><span>ℹ️</span>Nosotros</a>
      </aside>

      <!-- CONTENIDO -->
      <main class="main-content">
        <h1>Cálculo de salario</h1>

        <div class="subtitle-wrapper">
          <p class="moving-text">Bienvenido al sistema de cálculo de salario</p>
        </div>

        <div class="form-grid">
          <input type="text" placeholder="Diurna">
          <input type="text" placeholder="Mixta">
          <input type="text" placeholder="Nocturna">
          <input type="text" placeholder="Libre">
        </div>

        <div class="buttons">
          <button>Calcular salario</button>
          <button class="secondary">Limpiar</button>
        </div>
      </main>

    </div>

    <!-- FOOTER -->
    <footer>
      <div class="footer-bottom">
        © 2026 RIVASTECH. Todos los derechos reservados.
        <a href="#">Terminos y Privacidad</a>
        Desarrollado por
        <a href="#" class="rivas--tech">
          <img src="public/img/logoclaro.png" class="footer-logo-img">
          RIVASTECH
        </a>
        v3.3
      </div>
    </footer>

  </div>

  <!-- MENÚ INFERIOR -->
  <nav class="bottom-nav">
    <a class="menu-item active"><span>🏠</span>Home</a>
    <a class="menu-item"><span>📄</span>Histórico</a>
    <a class="menu-item"><span>👤</span>Perfil</a>
    <a class="menu-item"><span>ℹ️</span>Nosotros</a>
  </nav>

   <script>
    const menuItems = document.querySelectorAll('.menu-item');

    menuItems.forEach(item => {
      item.addEventListener('click', () => {
        menuItems.forEach(i => i.classList.remove('active'));
        item.classList.add('active');
      });
    });
  </script>


</body>
</html>
